services:
  backend:
    build: .
    container_name: backend-ledger
    restart: always
    ports:
      - "5001:5001"
    env_file:
      - .env

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes: 
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend